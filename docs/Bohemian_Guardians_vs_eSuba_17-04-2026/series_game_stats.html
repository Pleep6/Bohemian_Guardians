<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><title>Game Stats — Series</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c89b3c;--gold2:#f0d07a;--dark:#08090c;--panel:#0d1117;--panel2:#111820;--border:#1a2632;--border2:#243040;--text:#9ab0c0;--text2:#4a6070;--blue:#4fc3f7;--blue-dim:rgba(79,195,247,.10);--blue-bd:rgba(79,195,247,.28);--red:#ef5350;--red-dim:rgba(239,83,80,.10);--red-bd:rgba(239,83,80,.28);--green:#4caf50;--win:#4caf50;--win-bg:rgba(76,175,80,.1);}
html,body{height:100vh;width:100vw;overflow:hidden;background:var(--dark);color:var(--text);font-family:'Rajdhani',sans-serif;display:flex;flex-direction:column;}
.hdr{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:6px 16px;border-bottom:1px solid var(--border);background:var(--panel);}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-size:.95rem;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:var(--gold2);}
.tabs{display:flex;gap:4px;margin-left:auto;}.tab{padding:4px 13px;border-radius:3px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;transition:all .15s;user-select:none;}.tab.active{border-color:var(--gold);background:rgba(200,155,60,.08);color:var(--gold);}
.content{flex:1;min-height:0;overflow-y:auto;padding:10px 16px;display:flex;flex-direction:column;gap:10px;}.content::-webkit-scrollbar{width:4px}.content::-webkit-scrollbar-thumb{background:var(--border2)}
.section{display:none}.section.active{display:flex;flex-direction:column;gap:10px;}
.sec-lbl{font-family:'Barlow Condensed',sans-serif;font-size:.56rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--text2);padding:3px 0;border-bottom:1px solid var(--border);}
.gtable{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.gtable th{font-family:'Barlow Condensed',sans-serif;font-size:.56rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text2);padding:6px 10px;border-bottom:1px solid var(--border);background:var(--panel2);text-align:left;}
.gtable td{font-size:.8rem;padding:5px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}.gtable tr:last-child td{border-bottom:none;}
.mono{font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--gold2);}.mono.g{color:var(--green)}.mono.r{color:var(--red)}.mono.b{color:var(--blue)}.mono.dim{color:var(--text2);}
.champ-cell{display:flex;align-items:center;gap:6px;}.cico{width:26px;height:26px;border-radius:50%;overflow:hidden;background:var(--panel2);border:1px solid var(--border2);flex-shrink:0;}.cico img{width:100%;height:100%;object-fit:cover;display:block;}.cname{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;color:var(--text);}
.role-tag{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;font-weight:700;padding:1px 6px;border-radius:2px;background:var(--panel2);color:var(--text2);border:1px solid var(--border2);}
.side-b{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-bd);}.side-r{background:var(--red-dim);color:var(--red);border:1px solid var(--red-bd);}
.win-badge{display:inline-flex;align-items:center;gap:4px;font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:2px;padding:2px 8px;border-radius:3px;background:var(--win-bg);color:var(--win);border:1px solid rgba(76,175,80,.3);}
.obj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:5px;}
.obj-card{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:6px 10px;display:flex;flex-direction:column;gap:2px;}
.obj-pct{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:800;color:var(--gold2);line-height:1;}
.obj-lbl{font-family:'Barlow Condensed',sans-serif;font-size:.56rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);}
.obj-bar{height:4px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden;}.obj-fill{height:100%;border-radius:2px;background:var(--gold);}
</style></head><body>

"kills": 2, "deaths": 0, "assists": 2, "gold": 7206, "cs": 174}}, {"participantID": 2, "playerName": "ESB qualzy", "championName": "Qiyana", "role": "jungle", "stats": {"kills": 7, "deaths": 1, "assists": 3, "gold": 9631, "cs": 150.9000244140625}}, {"participantID": 3, "playerName": "ESB DON ADY", "championName": "Ryze", "role": "middle", "stats": {"kills": 2, "deaths": 2, "assists": 1, "gold": 7466, "cs": 184}}, {"participantID": 4, "playerName": "ESB raining", "championName": "Yunara", "role": "bottom", "stats": {"kills": 3, "deaths": 0, "assists": 0, "gold": 9095, "cs": 168.00000095367432}}, {"participantID": 5, "playerName": "ESB Mita", "championName": "Lulu", "role": "support", "stats": {"kills": 0, "deaths": 3, "assists": 6, "gold": 5137, "cs": 22}}], "our_obj": {"firstBlood": null, "firstTower": "16:46", "towers": 1, "dragons": [{"num": 1, "time_str": "08:58", "teamID": 100}, {"num": 2, "time_str": "14:41", "teamID": 100}, {"num": 3, "time_str": "20:14", "teamID": 200}, {"num": 4, "time_str": "26:28", "teamID": 100}], "firstHerald": null, "voidgrubs": 0, "firstVoidgrub": null, "baron": 0, "firstBaron": null, "plate_gold": 7200, "firstScuttler": 100, "firstScuttlerOurs": false}, "rival_obj": {"firstBlood": "02:16", "firstTower": "15:46", "towers": 11, "dragons": [{"num": 1, "time_str": "08:58", "teamID": 100}, {"num": 2, "time_str": "14:41", "teamID": 100}, {"num": 3, "time_str": "20:14", "teamID": 200}, {"num": 4, "time_str": "26:28", "teamID": 100}], "firstHerald": "18:53", "voidgrubs": 3, "firstVoidgrub": "09:56", "baron": 2, "firstBaron": "21:32", "plate_gold": 1920, "firstScuttler": 100, "firstScuttlerOurs": true}, "duration": "30:07"}], "series_obj": {"firstBlood": {"wins": 0, "total": 2, "pct": 0}, "firstTower": {"wins": 2, "total": 2, "pct": 100}, "firstHerald": {"wins": 0, "total": 2, "pct": 0}, "firstVoidgrub": {"wins": 1, "total": 2, "pct": 50}, "firstBaron": {"wins": 0, "total": 2, "pct": 0}, "firstScuttler": {"wins": 0, "total": 2, "pct": 0}, "plate_gold_avg": 6560, "dragon1": {"wins": 0, "total": 2, "pct": 0}, "dragon2": {"wins": 0, "total": 2, "pct": 0}, "voidgrubs": {"wins": 1, "total": 2, "pct": 50}, "wins": {"wins": 0, "total": 2, "pct": 0}}, "series_roster": [{"playerName": "BG MyCash", "role": "top", "games": 2, "champions": ["KSante", "Gnar"], "avg_kills": 1.0, "avg_deaths": 1.0, "avg_assists": 2.0, "avg_gold": 6863, "avg_cs": 165.0, "avg_kp_pct": 0.0}, {"playerName": "BG  HADES1", "role": "jungle", "games": 2, "champions": ["Pantheon", "Zaahen"], "avg_kills": 3.0, "avg_deaths": 4.0, "avg_assists": 1.0, "avg_gold": 6616, "avg_cs": 115.9, "avg_kp_pct": 0.0}, {"playerName": "BG Robi", "role": "middle", "games": 2, "champions": ["Azir", "Viktor"], "avg_kills": 0.0, "avg_deaths": 3.0, "avg_assists": 2.0, "avg_gold": 6094, "avg_cs": 171.0, "avg_kp_pct": 0.0}, {"playerName": "BG Lefterakiss", "role": "bottom", "games": 2, "champions": ["Ezreal", "Ashe"], "avg_kills": 3.5, "avg_deaths": 2.5, "avg_assists": 0.0, "avg_gold": 7647, "avg_cs": 156.0, "avg_kp_pct": 0.0}, {"playerName": "BG JJirkos", "role": "support", "games": 2, "champions": ["Alistar", "Seraphine"], "avg_kills": 0.0, "avg_deaths": 3.5, "avg_assists": 4.0, "avg_gold": 4362, "avg_cs": 13.5, "avg_kp_pct": 0.0}], "lane_diff_summary": {}};
const DATA=window.__GS__;let DD='';const CK={};
async function loadDD(){try{const v=await(await fetch('https://ddragon.leagueoflegends.com/api/versions.json')).json();DD=`https://ddragon.leagueoflegends.com/cdn/${v[0]}/img/champion/`;const d=await(await fetch(`https://ddragon.leagueoflegends.com/cdn/${v[0]}/data/en_US/champion.json`)).json();Object.entries(d.data).forEach(([k,v])=>CK[v.name]=k);document.querySelectorAll('img[data-champ]').forEach(img=>{const n=img.dataset.champ;img.src=`${DD}${CK[n]||n.replace(/[' .]/g,'')}.png`;img.onerror=()=>img.style.display='none';})}catch(e){}}
function cico(name){return`<div class="cico"><img data-champ="${name||''}" alt="${name||''}"></div>`;}
function sideTag(side){return`<span class="role-tag side-${side==='blue'?'b':'r'}">${side?.toUpperCase()||'?'}</span>`;}
function rTag(role){const M={top:'TOP',jungle:'JGL',mid:'MID',middle:'MID',bottom:'ADC',adc:'ADC',support:'SUP'};return`<span class="role-tag">${M[role]||'?'}</span>`;}
function kda(k,d,a){return`<span class="mono g">${k}</span>/<span class="mono r">${d}</span>/<span class="mono b">${a}</span>`;}
function renderSeries(){
  const sec=document.getElementById('sec-series');if(!sec)return;
  const sr=DATA.series_obj||{};
  const OBJ={firstBlood:'First Blood',firstTower:'First Tower',firstHerald:'First Herald',firstVoidgrub:'First Grub',firstBaron:'First Baron',dragon1:'Dragon 1',dragon2:'Dragon 2',voidgrubs:'Any Grub',wins:'WINS'};
  sec.innerHTML=`<div class="sec-lbl">SERIE — ${DATA.our_name||'Equipo'} · ${DATA.games?.length||0} games</div>
  <div class="obj-grid">${Object.entries(OBJ).map(([key,lbl])=>{const d=sr[key]||{wins:0,total:0,pct:0};const col=key==='wins'?'var(--green)':key.startsWith('first')?'var(--gold)':'var(--blue)';return`<div class="obj-card"><span class="obj-pct" style="color:${col}">${d.pct}%</span><span class="obj-lbl">${lbl}</span><div style="font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--text2)">${d.wins}/${d.total}</div><div class="obj-bar"><div class="obj-fill" style="width:${d.pct}%;background:${col}"></div></div></div>`;}).join('')}</div>
  <div class="sec-lbl" style="margin-top:4px">ROSTER — MEDIAS POR GAME</div>
  <table class="gtable"><thead><tr><th>JUGADOR</th><th>ROL</th><th>CHAMPS</th><th>K</th><th>D</th><th>A</th><th>KDA</th><th>GOLD</th><th>CS</th></tr></thead><tbody>${(DATA.series_roster||[]).map(p=>`<tr><td><span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--gold2)">${p.playerName}</span></td><td>${rTag(p.role)}</td><td><span class="mono dim">${(p.champions||[]).join(', ')}</span></td><td><span class="mono g">${p.avg_kills}</span></td><td><span class="mono r">${p.avg_deaths}</span></td><td><span class="mono b">${p.avg_assists}</span></td><td>${p.avg_deaths>0?((p.avg_kills+p.avg_assists)/p.avg_deaths).toFixed(1):'∞'}</td><td><span class="mono">${(p.avg_gold/1000).toFixed(1)}k</span></td><td><span class="mono">${p.avg_cs}</span></td></tr>`).join('')}</tbody></table>`;
}
function renderGame(gi){
  const sec=document.getElementById(`sec-g${gi}`);if(!sec)return;const g=DATA.games[gi];if(!g)return;
  function rosterTable(roster,side){return`<table class="gtable"><thead><tr><th>CAMPEÓN</th><th>JUGADOR</th><th>ROL</th><th>K/D/A</th><th>GOLD</th><th>CS</th></tr></thead><tbody>${roster.map(p=>`<tr><td><div class="champ-cell">${cico(p.championName)}<span class="cname">${p.championName}</span></div></td><td><span style="font-family:'Share Tech Mono',monospace;font-size:.68rem;color:var(--text2)">${p.playerName}</span></td><td>${rTag(p.role)}</td><td>${kda(p.stats?.kills||0,p.stats?.deaths||0,p.stats?.assists||0)}</td><td><span class="mono">${((p.stats?.gold||0)/1000).toFixed(1)}k</span></td><td><span class="mono">${p.stats?.cs||0}</span></td></tr>`).join('')}</tbody></table>`;}
  const winBadge=g.our_win?'<span class="win-badge">🏆 WIN</span>':'<span style="color:var(--text2);font-family:'Barlow Condensed',sans-serif;font-size:.72rem">LOSS</span>';
  sec.innerHTML=`<div style="display:flex;align-items:center;gap:10px;"><span style="font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:700;color:var(--gold)">${g.our_name||'Nuestro equipo'}</span>${sideTag(g.our_side)} ${winBadge}<span style="margin-left:auto;font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--text2)">⏱ ${g.duration||'?'}</span></div>
  <div class="sec-lbl">NUESTRO EQUIPO</div>${rosterTable(g.our_roster||[],g.our_side)}
  <div class="sec-lbl" style="margin-top:4px">RIVAL — ${g.rival_name||'Rival'} ${sideTag(g.rival_side)}</div>${rosterTable(g.rival_roster||[],g.rival_side)}
  <div class="sec-lbl" style="margin-top:4px">OBJETIVOS</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
    <div><div style="font-family:'Barlow Condensed',sans-serif;font-size:.65rem;color:var(--${g.our_side==='blue'?'blue':'red'});margin-bottom:4px;letter-spacing:2px;text-transform:uppercase">Nuestros</div>${['firstBlood','firstTower','firstHerald','firstVoidgrub','firstBaron'].map(k=>`<div style="display:flex;gap:6px;padding:3px 0;border-bottom:1px solid var(--border);font-family:'Barlow Condensed',sans-serif;font-size:.72rem;"><span style="flex:1;color:var(--text)">${k.replace('first','')}</span><span class="mono ${g.our_obj[k]?'g':'dim'}">${g.our_obj[k]||'—'}</span></div>`).join('')}<div style="margin-top:4px;font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--text2)">Towers: ${g.our_obj.towers||0} · Baron: ${g.our_obj.baron||0}</div></div>
    <div><div style="font-family:'Barlow Condensed',sans-serif;font-size:.65rem;color:var(--${g.rival_side==='blue'?'blue':'red'});margin-bottom:4px;letter-spacing:2px;text-transform:uppercase">Rival</div>${['firstBlood','firstTower','firstHerald','firstVoidgrub','firstBaron'].map(k=>`<div style="display:flex;gap:6px;padding:3px 0;border-bottom:1px solid var(--border);font-family:'Barlow Condensed',sans-serif;font-size:.72rem;"><span style="flex:1;color:var(--text)">${k.replace('first','')}</span><span class="mono ${g.rival_obj[k]?'r':'dim'}">${g.rival_obj[k]||'—'}</span></div>`).join('')}<div style="margin-top:4px;font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--text2)">Towers: ${g.rival_obj.towers||0} · Baron: ${g.rival_obj.baron||0}</div></div>
  </div>`;
}
(async()=>{
  document.body.style.visibility='hidden';
  await loadDD();
  const tabs=document.getElementById('tabs'),content=document.getElementById('content');
  const st=document.createElement('div');st.className='tab active';st.textContent='SERIE';st.onclick=()=>activate('series');tabs.appendChild(st);
  const ss=document.createElement('div');ss.className='section active';ss.id='sec-series';content.appendChild(ss);
  (DATA.games||[]).forEach((g,gi)=>{
    const t=document.createElement('div');t.className='tab';t.textContent=`G${g.game_num}`;t.onclick=()=>activate(`g${gi}`);tabs.appendChild(t);
    const s=document.createElement('div');s.className='section';s.id=`sec-g${gi}`;content.appendChild(s);
  });
  renderSeries();(DATA.games||[]).forEach((_,gi)=>renderGame(gi));
  await loadDD();
  document.body.style.visibility='visible';
  function activate(id){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    const sec=document.getElementById(`sec-${id}`);if(sec)sec.classList.add('active');
    const allTabs=document.querySelectorAll('.tab');
    if(id==='series')allTabs[0].classList.add('active');
    else{const gi=parseInt(id.replace('g',''));if(allTabs[gi+1])allTabs[gi+1].classList.add('active');}
  }
})();
</script></body></html>
